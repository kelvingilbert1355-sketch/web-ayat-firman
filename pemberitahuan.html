<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadwal Community Group</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background-color: #121212; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 24px; color: #fff; }
        .container { width: 100%; max-width: 550px; position: relative; }
        
        .info-container-modern { background: rgba(24, 24, 28, 0.95); border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(16px); padding: 40px; border-radius: 24px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); position: relative; }
        .info-container-modern h2 { font-family: 'Playfair Display', serif; font-size: 2.2rem; color: #ffffff; margin-bottom: 6px; }
        .info-subtitle-modern { color: #8a8a93; font-size: 0.95rem; margin-bottom: 30px; }
        .cg-list-modern { display: flex; flex-direction: column; gap: 20px; margin-bottom: 30px; }
        
        /* Tombol Setting Gerigi di Pojok Kanan Atas Kartu */
        .btn-setting-admin { position: absolute; top: 25px; right: 25px; background: transparent; border: none; color: rgba(255, 255, 255, 0.2); font-size: 1.3rem; cursor: pointer; transition: 0.3s; }
        .btn-setting-admin:hover { color: #d4af37; transform: rotate(45deg); }
        
        /* Gaya Kartu CG */
        .cg-item-modern { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.04); border-left: 4px solid #d4af37; padding: 24px; border-radius: 16px; text-align: left; transition: 0.3s; }
        .cg-item-modern h4 { color: #ffffff; font-size: 1.25rem; margin-bottom: 10px; font-weight: 600; }
        .cg-item-modern p { color: #a1a1aa; font-size: 1rem; margin-bottom: 6px; display: flex; align-items: center; gap: 10px; }
        .cg-item-modern i { color: #d4af37; width: 20px; text-align: center; font-size: 1.1rem; }
        
        /* Form Input Saat Mode Edit Admin */
        .edit-input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 8px 12px; border-radius: 8px; color: #fff; font-family: 'Montserrat', sans-serif; margin-bottom: 8px; font-size: 0.95rem; }
        .edit-input:focus { border-color: #d4af37; outline: none; }
        
        /* Tombol Navigasi */
        .btn-back-modern { display: inline-block; color: #a1a1aa; text-decoration: none; font-size: 0.95rem; font-weight: 600; padding: 12px 32px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.15); transition: 0.3s; background: transparent; cursor: pointer; }
        .btn-back-modern:hover { color: #fff; border-color: #fff; background: rgba(255,255,255,0.05); }

        /* Modal Popup Password Modern (Overlay) */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(5px); justify-content: center; align-items: center; z-index: 999; }
        .modal-box { background: #1a1a1e; border: 1px solid rgba(255,255,255,0.1); padding: 30px; border-radius: 20px; width: 90%; max-width: 350px; text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.5); }
        .modal-box h3 { font-size: 1.1rem; margin-bottom: 15px; font-weight: 600; letter-spacing: 0.5px; }
        .btn-modal { background: #d4af37; color: #121212; border: none; padding: 10px 24px; border-radius: 15px; font-weight: 600; font-size: 0.85rem; cursor: pointer; transition: 0.2s; margin-top: 5px; }
        .btn-modal:hover { background: #ffffff; }
        .btn-modal-close { background: transparent; border: none; color: #8a8a93; font-size: 0.85rem; cursor: pointer; margin-top: 12px; display: block; margin-left: auto; margin-right: auto; }
        .btn-modal-close:hover { color: #ef4444; }
        
        .animate-fade-in { animation: fadeInUp 0.8s ease-out; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

<body>
    <div class="container animate-fade-in">
        <div class="info-container-modern">
            <!-- TOMBOL GERIGI SETTING -->
            <button class="btn-setting-admin" onclick="bukaModalPassword()" title="Pengaturan Admin">
                <i class="fa-solid fa-gear"></i>
            </button>

            <h2>Jadwal Community Group</h2>
            <p class="info-subtitle-modern">Mari bertumbuh bersama dalam komunitas hangat</p>

            <!-- CONTAINER LIST JADWAL -->
            <div class="cg-list-modern" id="cgListContainer">
                <!-- Di-render oleh JavaScript -->
            </div>

            <!-- TOMBOL NAVIGASI -->
            <div id="navigationArea">
                <a href="index.html" class="btn-back-modern"><i class="fa-solid fa-arrow-left"></i> Kembali</a>
            </div>
        </div>
    </div>

    <!-- MODAL POPUP UNTUK INPUT PASSWORD -->
    <div class="modal-overlay" id="passwordModal">
        <div class="modal-box">
            <h3>Akses Kontrol Admin</h3>
            <input type="password" id="adminPassword" class="edit-input" style="text-align: center;" placeholder="Masukkan Password">
            <button class="btn-modal" onclick="verifikasiPasswordAdmin()">Masuk Mode Edit</button>
            <button class="btn-modal-close" onclick="tutupModalPassword()">Batalkan</button>
        </div>
    </div>

    <script>
        // Data default jika browser belum menyimpan perubahan apa pun
        const defaultJadwal = [
            { id: 1, area: "Youth Area A", hariJam: "Jumat, 19.00 WITA", lokasi: "Rumah Kevin" },
            { id: 2, area: "Youth Area B", hariJam: "Sabtu, 17.00 WITA", lokasi: "Cafe" }
        ];

        let isEditMode = false;

        function dapatkanJadwal() {
            let dataLokal = localStorage.getItem('jadwalCGData');
            return dataLokal ? JSON.parse(dataLokal) : defaultJadwal;
        }

        function renderJadwal() {
            const jadwalList = dapatkanJadwal();
            const container = document.getElementById("cgListContainer");
            container.innerHTML = "";

            jadwalList.forEach((item, index) => {
                if (isEditMode) {
                    // MODE EDIT FORM INPUT
                    container.innerHTML += `
                        <div class="cg-item-modern">
                            <input type="text" class="edit-input" id="editArea-${index}" value="${item.area}" style="font-weight:600; font-size:1.1rem; color:#d4af37;">
                            <p><i class="fa-solid fa-calendar-days"></i> <input type="text" class="edit-input" id="editHari-${index}" value="${item.hariJam}"></p>
                            <p><i class="fa-solid fa-location-dot"></i> <input type="text" class="edit-input" id="editLokasi-${index}" value="${item.lokasi}"></p>
                        </div>
                    `;
                } else {
                    // MODE TAMPILAN TAMU BIASA
                    container.innerHTML += `
                        <div class="cg-item-modern">
                            <h4>${item.area}</h4>
                            <p><i class="fa-solid fa-calendar-days"></i> ${item.hariJam}</p>
                            <p><i class="fa-solid fa-location-dot"></i> ${item.lokasi}</p>
                        </div>
                    `;
                }
            });
        }

        /* --- FUNGSI PANEL FORM MODAL --- */
        function bukaModalPassword() {
            document.getElementById("passwordModal").style.display = "flex";
            document.getElementById("adminPassword").focus();
        }

        function tutupModalPassword() {
            document.getElementById("passwordModal").style.display = "none";
            document.getElementById("adminPassword").value = "";
        }

        function verifikasiPasswordAdmin() {
            const inputSandi = document.getElementById("adminPassword").value;
            
            // Kamu bisa ganti kata sandi 'admin123' di bawah ini dengan sandi rahasiamu sendiri
            if (inputSandi === "admin123") {
                isEditMode = true;
                tutupModalPassword();
                
                // Ubah tombol navigasi bawah menjadi tombol Simpan & Batal
                document.getElementById("navigationArea").innerHTML = `
                    <button class="btn-back-modern" style="border-color:#d4af37; color:#d4af37;" onclick="simpanPerubahanJadwal()"><i class="fa-solid fa-floppy-disk"></i> Simpan</button>
                    <button class="btn-back-modern" style="margin-left:10px;" onclick="batalkanEdit()"><i class="fa-solid fa-xmark"></i> Batal</button>
                `;
                renderJadwal();
            } else {
                alert("Password salah! Akses ditolak.");
            }
        }

        function simpanPerubahanJadwal() {
            const jadwalList = dapatkanJadwal();
            
            const dataBaru = jadwalList.map((item, index) => {
                return {
                    id: item.id,
                    area: document.getElementById(`editArea-${index}`).value,
                    hariJam: document.getElementById(`editHari-${index}`).value,
                    lokasi: document.getElementById(`editLokasi-${index}`).value
                };
            });

            localStorage.setItem('jadwalCGData', JSON.stringify(dataBaru));
            isEditMode = false;
            
            kembalikanTombolNavigasi();
            renderJadwal();
            alert("Jadwal Community Group berhasil diperbarui!");
        }

        function batalkanEdit() {
            isEditMode = false;
            kembalikanTombolNavigasi();
            renderJadwal();
        }

        function kembalikanTombolNavigasi() {
            document.getElementById("navigationArea").innerHTML = `
                <a href="index.html" class="btn-back-modern"><i class="fa-solid fa-arrow-left"></i> Kembali</a>
            `;
        }

        window.onload = renderJadwal;
    </script>
</body>

</html>
